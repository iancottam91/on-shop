services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: dynamodb
      DEFAULT_REGION: eu-west-1
    ports:
      - "4566:4566"
    volumes:
      - ./infra/localstack/init-dynamodb.sh:/etc/localstack/init/ready.d/init-dynamodb.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 15

  stock-management-service:
    build: ./services/stock-management-service
    ports:
      - "3002:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://shop:shop@postgres:5432/inventory
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DYNAMODB_TABLE: ProductDetails
    volumes:
      - ./services/stock-management-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  browse-service:
    build: ./services/browse-service
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DYNAMODB_TABLE: ProductDetails
    volumes:
      - ./services/browse-service/src:/app/src
    depends_on:
      localstack:
        condition: service_healthy

  purchase-service:
    build: ./services/purchase-service
    ports:
      - "3003:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://shop:shop@postgres:5432/inventory
      REDIS_URL: redis://redis:6379
      PAYMENT_FAILURE_RATE: "${PAYMENT_FAILURE_RATE:-0}"
    volumes:
      - ./services/purchase-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
